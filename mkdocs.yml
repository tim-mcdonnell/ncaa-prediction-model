site_name: NCAA Basketball Prediction Model
site_description: Machine learning model to predict NCAA men's basketball game outcomes
site_author: Your Name
repo_url: https://github.com/tim-mcdonnell/ncaa-prediction-model
repo_name: NCAA Prediction Model

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Project Overview: 
    - Overview: overview/index.md
    - Architecture: overview/architecture.md
    - Tech Stack: overview/tech-stack.md
  - Data:
    - Collection:
      - ESPN API Integration: data/collection/espn-api-integration.md
  - Development:
    - Setup: development/setup.md
    - Contributing: development/contributing.md
    - Code Standards: development/code-standards.md
    - Project Structure: development/project-structure.md
    - Pipeline Architecture: development/pipeline-architecture.md
    - Modularity Guidelines: development/modularity-guidelines.md
    - Implementation Plan: development/implementation-plan.md
    - Test Strategy: development/test-strategy.md
    - AI Coding Agent Guide: development/ai-coding-agent-guide.md
    - AI Task Authoring Guide: development/ai-task-authoring-guide.md
  - Documentation Standards:
    - Overview: examples/index.md
    - Milestone Example: examples/ai_milestone_example.md
    - AI Task Example: examples/ai_task_example.md
    - Issue Example: examples/ai_issue_example.md
    - PR Example: examples/ai_pr_example.md
  - API Reference: reference/ 